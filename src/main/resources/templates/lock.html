<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최현영 - 비밀번호 확인</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: nav(active=${null})}"></div>

<div class="page-body">
<div class="container">
    <div class="lock-box">
        <h1 class="name" style="margin-bottom: 8px;">비밀번호 확인</h1>
        <p class="intro-p" style="margin-bottom: 24px;">이 페이지는 비밀번호를 입력해야 볼 수 있습니다.</p>
        <form method="post" th:action="@{/unlock}" class="lock-form">
            <input type="hidden" name="redirect" th:value="${redirect}">
            <input type="password" name="password" placeholder="비밀번호" class="lock-input" autofocus>
            <button type="submit" class="portfolio-link">확인</button>
        </form>
        <p th:if="${error}" class="lock-error">비밀번호가 올바르지 않습니다.</p>
    </div>
</div>
</div>

</body>
</html>
