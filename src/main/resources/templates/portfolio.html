<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최현영 - 포트폴리오</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: nav(active='portfolio')}"></div>

<div class="page-body">
<div class="container">
    <header>
        <h1 class="name">포트폴리오</h1>
    </header>

    <section>
        <div class="portfolio-row">
            <h2>StockSense</h2>
            <div class="portfolio-card-lg">
                <img class="portfolio-card-thumb" th:src="@{/images/stocksense-sample.jpg}" alt="StockSense 미리보기">
                <p class="portfolio-card-desc">한국투자증권 API 기반 주식 포트폴리오 관리 및 AI 주가 예측 서비스</p>
                <div class="portfolio-card-links">
                    <a class="portfolio-link" href="/portfolio/stocksense">상세보기</a>
                    <a class="portfolio-link portfolio-link-secondary" href="https://stocksense.hypepia.com" target="_blank" rel="noopener">사이트 바로가기 ↗</a>
                    <a class="portfolio-link portfolio-link-secondary" href="https://github.com/hy1116/stocksense" target="_blank" rel="noopener">GitHub ↗</a>
                </div>
            </div>
        </div>
        <div class="portfolio-row">
            <h2>APIverse</h2>
            <div class="portfolio-card-lg">
                <img class="portfolio-card-thumb" th:src="@{/images/apiverse-sample.jpg}" alt="APIverse 미리보기">
                <p class="portfolio-card-desc">가입 즉시 샌드박스 키가 발급되는 Developer-First API 마켓플레이스 & 게이트웨이</p>
                <div class="portfolio-card-links">
                    <a class="portfolio-link" href="/portfolio/apiverse">상세보기</a>
                    <a class="portfolio-link portfolio-link-secondary" href="https://apiverse.hypepia.com" target="_blank" rel="noopener">사이트 바로가기 ↗</a>
                    <a class="portfolio-link portfolio-link-secondary" href="https://github.com/hy1116/apiverse" target="_blank" rel="noopener">GitHub ↗</a>
                </div>
            </div>
        </div>
    </section>
</div>
</div>

</body>
</html>
